<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>我的订单 - 智慧医药系统</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>
    <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
    <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">
</head>
<body>

<div id="preloader">
    <div id="status"></div>
</div>

<div th:replace="~{common/common-bar::#header}"></div>

<div id="dashboard">
    <div class="container">
        <div class="dashboard-main">
            <div class="row">
                <div class="col-lg-3 col-md-12 col-sm-12 col-xs-12">
                    <div th:replace="~{common/common-bar::#dashboard-sidebar(cur='orders')}"></div>
                </div>
                <div class="col-lg-9 col-md-12 col-sm-12 col-xs-12">
                    <div class="dashboard-content">
                        <div class="dashboard-review single-comments">
                            <div class="comments">
                                <div style="margin-top: 30px;">
                                    <h3>我的订单</h3>
                                    <hr/>
                                </div>
                                <div th:if="${orders == null || orders.isEmpty()}">
                                    <div class="text-center p-5">
                                        <i class="fa fa-shopping-cart" style="font-size: 64px; color: #ddd;"></i>
                                        <h4 class="mt-3 text-muted">暂无订单</h4>
                                        <a href="findMedicines" class="btn btn-na mt-2">去选购药品</a>
                                    </div>
                                </div>
                                <div th:each="order:${orders}" class="order-card p-3 mb-3 border rounded" style="background: #fff;">
                                    <div class="row align-items-center">
                                        <div class="col-md-2">
                                            <img th:src="${order.medicineImg}" alt="药品图片" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;"
                                                 onerror="this.src='assets/images/medicine-default.png'"/>
                                        </div>
                                        <div class="col-md-4">
                                            <h5 th:text="${order.medicineName}"></h5>
                                            <p class="text-muted mb-1">订单号：<span th:text="${order.orderNo}"></span></p>
                                            <p class="text-muted mb-1">数量：<span th:text="${order.quantity}"></span> 盒 x <span th:text="${order.price}"></span>元</p>
                                            <p class="text-muted mb-0">下单时间：<span th:text="${#dates.format(order.createTime, 'yyyy-MM-dd HH:mm')}"></span></p>
                                        </div>
                                        <div class="col-md-3 text-center">
                                            <span th:if="${order.status == 0}" class="badge badge-warning" style="font-size: 14px; padding: 8px 16px; background: #f39c12;">待支付</span>
                                            <span th:if="${order.status == 1}" class="badge badge-success" style="font-size: 14px; padding: 8px 16px; background: #27ae60;">已支付</span>
                                            <span th:if="${order.status == 2}" class="badge badge-secondary" style="font-size: 14px; padding: 8px 16px; background: #95a5a6;">已取消</span>
                                            <p th:if="${order.payTime != null}" class="text-muted mt-1 mb-0" style="font-size: 12px;">
                                                支付时间：<span th:text="${#dates.format(order.payTime, 'yyyy-MM-dd HH:mm')}"></span>
                                            </p>
                                        </div>
                                        <div class="col-md-3 text-right">
                                            <h4 style="color: #e74c3c; font-weight: bold;"><span th:text="${order.totalPrice}"></span></h4>
                                            <button th:if="${order.status == 0}" class="btn btn-sm btn-danger mt-1" th:onclick="'payOrder(' + ${order.id} + ')'">
                                                <i class="fa fa-credit-card"></i> 去支付
                                            </button>
                                            <button th:if="${order.status == 1}" class="btn btn-sm btn-success mt-1" disabled>
                                                <i class="fa fa-check"></i> 已支付
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{common/common-bar::#back}"></div>
<div th:replace="~{common/common-bar::#footer}"></div>
<div th:replace="~{common/common-bar::#search}"></div>
<div th:replace="~{common/common-bar::#back-to-top}"></div>

<!-- 支付弹窗 -->
<div class="modal fade" id="payModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header" style="background: #1677ff; color: white;">
                <h5 class="modal-title"><i class="fa fa-credit-card"></i> 收银台</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="color: white;">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div id="payActions" class="text-center mt-4" style="display: none;">
                    <p class="text-muted" id="payHint"></p>
                    <button class="btn btn-primary" id="payActionBtn"><i class="fa fa-check"></i> 确认</button>
                    <button class="btn btn-default ml-2" onclick="cancelOrder()">取消订单</button>
                </div>
                <div id="paySuccess" style="display: none;" class="text-center mt-3">
                    <i class="fa fa-check-circle" style="font-size: 64px; color: #27ae60;"></i>
                    <h3 class="mt-2" style="color: #27ae60;">支付成功！</h3>
                    <p>感谢您的购买，祝您早日康复！</p>
                    <button class="btn btn-primary mt-2" onclick="location.reload()">返回订单列表</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/jquery-3.5.1.min.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/plugin.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/custom-nav.js"></script>
<script src="assets/js/jpanelmenu.min.js"></script>
<script src="assets/js/dashboard-custom.js"></script>
<script src="common/utils/reg.js"></script>
<script src="common/layer/layer.js"></script>
<script src="common/custom.js"></script>

<script>
var currentOrderId = null;

function payOrder(orderId) {
    currentOrderId = orderId;
    $('#payActions, #paySuccess').hide();
    $('#payModal').modal('show');
    startMockPay();
}

// 支付（模拟支付）
function startMockPay() {
    if (!currentOrderId) return;
    $('#payHint').text('模拟支付处理中...');
    $('#payActionBtn').text('确认支付').off('click').on('click', function() {
        layer.msg('模拟支付处理中...');
        $.ajax({
            type: 'POST', url: '/order/pay',
            data: { orderId: currentOrderId, payType: 'mock' },
            dataType: 'json',
            success: function (data) {
                if (data['code'] !== 'SUCCESS') { layer.msg(data['message']); return; }
                $('#payActions').hide();
                $('#paySuccess').show();
                layer.msg('支付成功');
            }
        });
    });
    $('#payActions').show();
});

function cancelOrder() {
    if (!currentOrderId) return;
    $.ajax({
        type: 'POST', url: 'order/cancel',
        data: { orderId: currentOrderId },
        dataType: 'json',
        success: function (data) {
            layer.msg(data['message']);
            $('#payModal').modal('hide');
        }
    });
}
</script>
</body>
</html>
