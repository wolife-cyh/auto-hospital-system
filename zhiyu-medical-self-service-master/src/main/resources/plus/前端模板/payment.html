<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>支付中心 - 智慧医药系统</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>
    <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
    <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">

    <style>
        body { background: #f5f7fa; }
        .payment-container { max-width: 860px; margin: 40px auto; }
        .payment-header {
            background: linear-gradient(135deg, #1677ff, #0958d9);
            color: #fff;
            border-radius: 12px 12px 0 0;
            padding: 30px 40px;
            text-align: center;
        }
        .payment-header .icon { font-size: 48px; margin-bottom: 10px; }
        .payment-header h2 { font-size: 24px; margin: 0; }
        .payment-header p { opacity: 0.85; margin: 5px 0 0; }
        .payment-body {
            background: #fff;
            border-radius: 0 0 12px 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        /* 药品信息卡片 */
        .medicine-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: #fafafa;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
            margin-bottom: 30px;
        }
        .medicine-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .medicine-card .info { flex: 1; }
        .medicine-card .info h4 { margin: 0 0 6px; font-size: 18px; }
        .medicine-card .info .meta { color: #888; font-size: 14px; margin-bottom: 4px; }
        .medicine-card .info .price { color: #e74c3c; font-size: 16px; font-weight: bold; }
        .medicine-card .total-price {
            text-align: right;
            min-width: 120px;
        }
        .medicine-card .total-price .label { color: #888; font-size: 13px; }
        .medicine-card .total-price .amount {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
        }
        .medicine-card .total-price .amount small { font-size: 16px; }
        /* 支付方式 */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .method-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .method-tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s;
            background: #fafafa;
        }
        .method-tab:hover { border-color: #1677ff; }
        .method-tab.active {
            border-color: #1677ff;
            background: #e6f4ff;
        }
        .method-tab i { font-size: 32px; display: block; margin-bottom: 6px; }
        .method-tab .name { font-weight: 600; font-size: 15px; }
        .method-tab .sub { font-size: 12px; color: #999; }
        .method-tab.mock i { color: #95a5a6; }
        /* 订单信息 */
        .order-info-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 8px;
            font-size: 13px;
            color: #888;
            margin-bottom: 30px;
        }
        /* 支付按钮 */
        .pay-actions { text-align: center; }
        .pay-actions .btn-pay {
            padding: 14px 60px;
            font-size: 18px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1677ff, #0958d9);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 14px rgba(22,119,255,0.35);
        }
        .pay-actions .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22,119,255,0.45);
        }
        .pay-actions .btn-pay:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .pay-actions .btn-cancel {
            display: inline-block;
            margin-top: 12px;
            color: #999;
            cursor: pointer;
            font-size: 14px;
        }
        .pay-actions .btn-cancel:hover { color: #e74c3c; }
        /* 成功状态 */
        .pay-success {
            display: none;
            text-align: center;
            padding: 30px 0;
        }
        .pay-success i { font-size: 72px; color: #27ae60; }
        .pay-success h3 { color: #27ae60; margin-top: 16px; }
        .pay-success .btn-view-order {
            margin-top: 20px;
            padding: 12px 40px;
        }
        /* 倒计时 */
        .countdown { color: #e74c3c; font-weight: bold; }

        @media (max-width: 768px) {
            .payment-body { padding: 20px; }
            .medicine-card { flex-direction: column; text-align: center; }
            .medicine-card .total-price { text-align: center; }
            .method-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="preloader">
    <div id="status"></div>
</div>

<div th:replace="~{common/common-bar::#header}"></div>

<div class="payment-container">
    <div class="payment-header" style="position: relative;">
        <!-- 右上角关闭按钮 -->
        <a href="javascript:void(0)" onclick="closePaymentPage()" style="
            position: absolute; top: 12px; right: 20px;
            color: #fff; font-size: 28px; opacity: 0.7;
            text-decoration: none; transition: opacity 0.2s;
        " onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"
           title="返回药品页面">
            &times;
        </a>
        <div class="icon"><i class="fa fa-credit-card"></i></div>
        <h2>订单支付</h2>
        <p>请在 <span class="countdown" id="countdown">30:00</span> 内完成支付，超时订单将自动取消</p>
    </div>

    <div class="payment-body">

        <!-- ====== 药品信息 ====== -->
        <div class="medicine-card">
            <img th:src="${order.medicineImg}" alt="药品图片"
                 onerror="this.src='assets/images/medicine-default.png'"/>
            <div class="info">
                <h4 th:text="${order.medicineName}">药品名称</h4>
                <div class="meta">订单号：<span th:text="${order.orderNo}">MED20250101001</span></div>
                <div class="meta">数量：<span th:text="${order.quantity}"></span> 盒 × ¥<span th:text="${order.price}"></span></div>
                <div class="price">单价：¥<span th:text="${order.price}"></span>/盒</div>
            </div>
            <div class="total-price">
                <div class="label">应付金额</div>
                <div class="amount"><small>¥</small><span id="displayTotal" th:text="${order.totalPrice}">0.00</span></div>
            </div>
        </div>

        <!-- ====== 订单信息栏 ====== -->
        <div class="order-info-bar">
            <span>🕐 下单时间：<span th:text="${#dates.format(order.createTime, 'yyyy-MM-dd HH:mm:ss')}"></span></span>
            <span>📋 订单号：<span th:text="${order.orderNo}"></span></span>
        </div>

        <!-- ====== 操作按钮 ====== -->
        <div class="pay-actions" id="payActions">
            <button class="btn-pay" id="confirmPayBtn" onclick="confirmPay()">
                <i class="fa fa-check-circle"></i> 确认支付
            </button>
            <br/>
            <a class="btn-cancel" onclick="cancelOrder()">
                <i class="fa fa-times"></i> 取消订单，返回上一页
            </a>
        </div>

        <!-- ====== 支付成功 ====== -->
        <div class="pay-success" id="paySuccess">
            <i class="fa fa-check-circle"></i>
            <h3>支付成功！</h3>
            <p>感谢您的购买，祝您早日康复！</p>
            <a href="/orders" class="btn btn-primary btn-view-order">
                <i class="fa fa-list"></i> 查看订单
            </a>
            <a href="/index.html" class="btn btn-default btn-view-order">
                <i class="fa fa-home"></i> 返回首页
            </a>
            <br/>
            <a class="btn-cancel" onclick="closePaymentPage()" style="margin-top:8px;">
                <i class="fa fa-times"></i> 关闭
            </a>
        </div>

    </div>
</div>

<script src="assets/js/jquery-3.5.1.min.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/plugin.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/custom-nav.js"></script>
<script src="common/utils/reg.js"></script>
<script src="common/layer/layer.js"></script>
<script src="common/custom.js"></script>
<!-- QR码生成库 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ====== 数据 ======
var orderId = [[${order.id}]];
var medicineId = [[${order.medicineId}]];
var orderNo = '[[${order.orderNo}]]';
var totalPrice = [[${order.totalPrice}]];
var countdownSeconds = 30 * 60; // 30分钟倒计时
var countdownTimer = null;

// ====== 页面初始化 ======
$(function() {
    startCountdown();
});

// ====== 倒计时 ======
function startCountdown() {
    countdownTimer = setInterval(function() {
        countdownSeconds--;
        if (countdownSeconds <= 0) {
            clearInterval(countdownTimer);
            $('#countdown').text('已超时');
            layer.msg('支付超时，订单已取消');
            cancelOrder();
            return;
        }
        var min = Math.floor(countdownSeconds / 60);
        var sec = countdownSeconds % 60;
        $('#countdown').text(
            (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec
        );
    }, 1000);
}

// ====== 确认支付（模拟支付） ======
function confirmPay() {
    var btn = $('#confirmPayBtn');
    btn.prop('disabled', true).text('处理中...');

    // 模拟支付 — 直接调用接口
    layer.msg('模拟支付处理中...');
    $.ajax({
        type: 'POST',
        url: '/order/pay',
        data: { orderId: orderId, payType: 'mock' },
        dataType: 'json',
        success: function (res) {
            if (res['code'] !== 'SUCCESS') {
                layer.msg(res['message']);
                btn.prop('disabled', false).text('确认支付');
                return;
            }
            // 支付成功
            clearInterval(countdownTimer);
            $('#payActions').hide();
            $('#paySuccess').fadeIn();
            layer.msg('支付成功！');
        },
        error: function () {
            layer.msg('网络错误，请重试');
            btn.prop('disabled', false).text('确认支付');
        }
    });
}

// ====== 关闭支付页面，回到药品详情 ======
function closePaymentPage() {
    if (medicineId) {
        window.location.href = '/findMedicineOne?id=' + medicineId;
    } else {
        window.location.href = '/orders';
    }
}

// ====== 取消订单 ======
function cancelOrder() {
    // 直接取消订单，无需二次确认
    layer.msg('正在取消订单...');
    $.ajax({
        type: 'POST',
        url: '/order/cancel',
        data: { orderId: orderId },
        dataType: 'json',
        success: function (res) {
            layer.msg(res['message']);
            setTimeout(function() { window.location.href = '/orders'; }, 1000);
        },
        error: function () {
            layer.msg('取消失败，请重试');
        }
    });
}
</script>

<div th:replace="~{common/common-bar::#back}"></div>
<div th:replace="~{common/common-bar::#footer}"></div>
<div th:replace="~{common/common-bar::#search}"></div>
<div th:replace="~{common/common-bar::#back-to-top}"></div>

</body>
</html>
