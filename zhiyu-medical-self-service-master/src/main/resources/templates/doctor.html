<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>智能医生 - 智愈医疗</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>
    <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>
    <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
    <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">

    <style>
        /* === 消息气泡样式 === */
        .msg-sent {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-bottom: 15px;
        }
        .msg-sent .msg-content {
            background: #f1f1f1;
            color: #333;
            border-radius: 15px 15px 5px 15px;
            padding: 10px 15px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.6;
            text-align: left; /* 气泡内文字左对齐 */
        }

        .msg-received {
            display: flex;
            margin-bottom: 15px;
        }
        .msg-image {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .msg-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .msg-body {
            display: flex;
            flex-direction: column;
        }
        .msg-received .msg-content {
            background: #f1f1f1;
            border-radius: 15px 15px 5px 15px;
            padding: 10px 15px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .msg-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .followup-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #4CAF50;
            color: #4CAF50;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-outline:hover {
            background: #4CAF50;
            color: white;
        }

        .msg-content h1, .msg-content h2, .msg-content h3,
        .msg-content h4, .msg-content h5, .msg-content h6 {
            margin: 8px 0 4px;
            font-size: inherit;
            font-weight: 600;
        }
        .msg-content h1 { font-size: 1.2em; }
        .msg-content h2 { font-size: 1.15em; }
        .msg-content h3 { font-size: 1.1em; }
        .msg-content strong { font-weight: 600; }
        .msg-content table {
            border-collapse: collapse;
            margin: 6px 0;
            width: 100%;
            font-size: 13px;
        }
        .msg-content table th,
        .msg-content table td {
            border: 1px solid #ddd;
            padding: 4px 8px;
            text-align: left;
        }
        .msg-content table th {
            background: #e8e8e8;
            font-weight: 600;
        }
        .msg-content ul, .msg-content ol {
            margin: 4px 0;
            padding-left: 20px;
        }
        .msg-content li {
            margin-bottom: 2px;
        }
        .msg-content p {
            margin: 4px 0;
        }

        /* === 对话边栏样式 === */
        .conv-sidebar {
            background: #fafafa;
            border-right: 1px solid #e8e8e8;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .conv-sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }
        .conv-sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .conv-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            position: relative;
        }
        .conv-item:hover {
            background: #eef4ff;
        }
        .conv-item.active {
            background: #e0ecff;
            border-left: 3px solid #1a73e8;
        }
        .conv-item-title {
            font-size: 13px;
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
        }
        .conv-item-time {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }
        .conv-item-delete {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            display: none;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .conv-item-delete:hover {
            color: #e53935;
            background: #fce4e4;
        }
        .conv-item:hover .conv-item-delete {
            display: block;
        }
        .btn-new-chat {
            width: 100%;
            padding: 8px;
            border: 1px solid #1a73e8;
            background: white;
            color: #1a73e8;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-new-chat:hover {
            background: #1a73e8;
            color: white;
        }
        .no-conv-msg {
            text-align: center;
            color: #bbb;
            font-size: 12px;
            padding: 30px 10px;
        }
        /* RAG 知识库命中标记（绿色） */
        .msg-content blockquote.rag-hit {
            background: #e8f5e9 !important;
            border-left: 4px solid #4caf50 !important;
            border-radius: 0 6px 6px 0 !important;
            padding: 10px 14px !important;
            margin: 0 0 12px 0 !important;
            color: #2e7d32 !important;
            font-size: 13px !important;
            line-height: 1.6 !important;
        }
        .msg-content blockquote.rag-hit p {
            margin: 0;
            color: #2e7d32;
        }
        /* RAG 知识库未命中标记（灰色） */
        .msg-content blockquote.rag-miss {
            background: #f5f5f5 !important;
            border-left: 4px solid #9e9e9e !important;
            border-radius: 0 6px 6px 0 !important;
            padding: 10px 14px !important;
            margin: 0 0 12px 0 !important;
            color: #757575 !important;
            font-size: 13px !important;
            line-height: 1.6 !important;
        }
        .msg-content blockquote.rag-miss p {
            margin: 0;
            color: #757575;
        }
    </style>
</head>
<body>

<div id="preloader">
    <div id="status"></div>
</div>

<div th:replace="common/common-bar::#header"></div>

<div id="dashboard">
    <div class="container">
        <div class="dashboard-main">
            <div class="row">
                <div class="col-lg-3 col-md-12 col-sm-12 col-xs-12">
                    <div th:replace="common/common-bar::#dashboard-sidebar(cur='doctor')"></div>
                </div>
                <div class="col-lg-9 col-md-12 col-sm-12 col-xs-12">
                    <div class="dashboard-content">
                        <div class="row">
                            <!-- 对话边栏 -->
                            <div class="col-lg-3 col-md-3 col-sm-12" style="padding-right:0;">
                                <div class="conv-sidebar">
                                    <div class="conv-sidebar-header">
                                        <button class="btn-new-chat" onclick="newConversation()">
                                            <i class="fa fa-plus"></i> 新对话
                                        </button>
                                    </div>
                                    <div class="conv-sidebar-list" id="conversationList">
                                        <div class="no-conv-msg" id="noConvMsg">暂无历史对话</div>
                                    </div>
                                </div>
                            </div>
                            <!-- 聊天区域 -->
                            <div class="col-lg-9 col-md-9 col-sm-12" style="padding-left:0;">
                                <div class="message">
                                    <div class="message-header inbox-item">
                                        <div class="inbox-image">
                                            <img src="assets/images/team/user-2.jpg" alt="image">
                                        </div>
                                        <div class="inbox-content">
                                            <p>智能在线医生</p>
                                            <span>你的专属医生，随时为您服务！</span>
                                        </div>
                                    </div>
                                    <div class="message-content">
                                        <div id="messages" style="height: 260px;overflow-y: auto">
                                            <div class="msg-received">
                                                <div class="msg-image">
                                                    <img src="assets/images/team/user-2.jpg" alt="image">
                                                </div>
                                                <div class="msg-body">
                                                    <div class="msg-content">
                                                        [[${session.loginUser.userName}]]你好，我是您的智能专属医生，身体不舒服或者有任何需要咨询的问题，都可以向我提问，我会全心全意为您解答！
                                                    </div>
                                                    <div class="msg-time">刚刚</div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="msg-reply">
                                            <textarea id="message" placeholder="输入要咨询的内容..." onkeydown="if(event.keyCode==13&&!event.shiftKey){event.preventDefault();send();}"></textarea>
                                            <button id="sendBtn" onclick="send()" class="btn btn-na mt-2 pull-right">发送</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="common/common-bar::#back"></div>
<div th:replace="common/common-bar::#footer"></div>
<div th:replace="common/common-bar::#search"></div>
<div th:replace="common/common-bar::#back-to-top"></div>

<script src="assets/js/jquery-3.5.1.min.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/plugin.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/custom-nav.js"></script>
<script src="assets/js/jpanelmenu.min.js"></script>
<script src="assets/js/dashboard-custom.js"></script>
<script src="common/utils/reg.js"></script>
<script src="common/layer/layer.js"></script>
<script src="common/custom.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>

<script>
    // ==================== 全局变量 ====================
    let currentConsultContext = null;   // 保存当前的诊断上下文
    let currentConversationId = null;  // 当前会话 ID
    let currentEventSource = null;     // 当前 EventSource（用于停止）
    // 缓冲区：记录每个会话正在进行的流数据，切回来时可继续显示
    window.streamBuffers = window.streamBuffers || {};

    // ==================== 页面初始化 ====================
    $(document).ready(function() {
        checkConsultContext();
        // 加载会话列表，有历史则打开最近一条，无历史则创建新会话
        loadConversationList(function() {
            // 回调：loadConversationList 执行完后判断
        });
    });

    window.onload = messageInit;

    // ==================== 会话管理 ====================

    /** 创建新会话 */
    function newConversation() {
        // 让当前流在后台跑完，原对话的 AI 回复仍能保存到数据库
        if (currentEventSource) {
            currentEventSource._abandoned = true;
        }
        currentEventSource = null;
        $('#sendBtn').text('发送');
        $.ajax({
            url: '/message/conversation/new',
            type: 'POST',
            success: function(resp) {
                if (resp.code === 'SUCCESS') {
                    currentConversationId = resp.data.conversationId;
                    // 清空聊天区域，显示欢迎消息
                    resetChatArea();
                    // 刷新边栏列表
                    loadConversationList();
                    messageInit();
                } else {
                    layer.msg(resp.message || '创建会话失败', {icon: 2});
                }
            },
            error: function() {
                layer.msg('网络错误', {icon: 2});
            }
        });
    }

    /** 切换到指定会话 */
    let liveTimer = null;  // 缓冲区实时更新定时器

    function switchConversation(convId) {
        if (convId === currentConversationId) return;

        // 停止上一个会话的实时更新
        if (liveTimer) {
            clearInterval(liveTimer);
            liveTimer = null;
        }

        // 标记当前流为遗弃（仍写缓冲区，不操作 UI）
        if (currentEventSource) {
            currentEventSource._abandoned = true;
            currentEventSource = null;
        }
        $('#sendBtn').text('发送');

        currentConversationId = convId;

        // 检查缓冲区：如果这个会话有正在进行的流，从缓冲区实时渲染
        if (window.streamBuffers[convId] && window.streamBuffers[convId].active) {
            // 从 DB 加载历史消息，做基础
            loadBaseMessages(convId, function() {
                // 加载完成后附加 AI 流容器并启动实时更新
                appendStreamingContainer(convId, window.streamBuffers[convId].text);
            });
        } else {
            // 没有活跃流，正常加载
            loadBaseMessages(convId);
        }
    }

    /** 加载历史消息并高亮边栏 */
    function loadBaseMessages(convId, callback) {
        $.ajax({
            url: '/message/conversation/' + convId + '/messages',
            type: 'GET',
            success: function(resp) {
                if (resp.code === 'SUCCESS') {
                    renderMessages(resp.data || []);
                    $('#conversationList .conv-item').removeClass('active');
                    $('#conv-' + convId).addClass('active');
                    messageInit();
                }
                if (callback) callback();
            },
            error: function() {
                layer.msg('加载会话失败', {icon: 2});
                if (callback) callback();
            }
        });
    }

    /** 附加 AI 流消息容器，从缓冲区数据启动实时渲染 */
    function appendStreamingContainer(convId, initialText) {
        if (currentConversationId !== convId) return;
        var msgId = 'stream-live-' + convId;
        // 移除可能残留的旧容器
        $('#' + msgId).remove();
        $('#messages').append(
            '<div class="msg-received" id="' + msgId + '">' +
                '<div class="msg-image">' +
                    '<img src="assets/images/team/user-2.jpg" alt="doctor">' +
                '</div>' +
                '<div class="msg-body">' +
                    '<div class="msg-content">' +
                        (initialText ? renderMarkdown(initialText) : '<span style="color:#999">思考中…</span>') +
                    '</div>' +
                '</div>' +
            '</div>'
        );
        messageInit();

        // 实时更新：每 200ms 从缓冲区读取最新数据
        if (liveTimer) clearInterval(liveTimer);
        liveTimer = setInterval(function() {
            // 用户切走了，停止
            if (currentConversationId !== convId) {
                clearInterval(liveTimer);
                liveTimer = null;
                return;
            }
            var buf = window.streamBuffers[convId];
            if (!buf) {
                clearInterval(liveTimer);
                liveTimer = null;
                return;
            }
            if (!buf.active) {
                // 流已结束，从 DB 完整加载
                clearInterval(liveTimer);
                liveTimer = null;
                loadBaseMessages(convId);
                return;
            }
            // 有最新内容，更新显示
            if (buf.text) {
                $('#' + msgId + ' .msg-content').html(renderMarkdown(buf.text));
                messageInit();
            }
        }, 200);
    }

    /** 检查会话最后一条是否是未回复的用户消息，是则轮询等待 */
    /** 删除指定会话 */
    function deleteConversation(convId, event) {
        event.stopPropagation();
        layer.confirm('确定删除此对话吗？', {icon: 3, title: '提示'}, function(index) {
            $.ajax({
                url: '/message/conversation/' + convId + '/delete',
                type: 'POST',
                success: function(resp) {
                    if (resp.code === 'SUCCESS') {
                        layer.msg('已删除', {icon: 1});
                        // 如果删除的是当前会话，创建新会话（内含 loadConversationList）
                        if (convId === currentConversationId) {
                            newConversation();
                        } else {
                            loadConversationList();
                        }
                    } else {
                        layer.msg(resp.message || '删除失败', {icon: 2});
                    }
                },
                error: function() {
                    layer.msg('网络错误', {icon: 2});
                }
            });
            layer.close(index);
        });
    }

    /** 加载会话列表到边栏 */
    function loadConversationList(callback) {
        $.ajax({
            url: '/message/conversation/list',
            type: 'GET',
            success: function(resp) {
                if (resp.code === 'SUCCESS' && resp.data) {
                    var list = resp.data;
                    var html = '';
                    if (list.length === 0) {
                        html = '<div class="no-conv-msg">暂无历史对话</div>';
                        // 无会话 → 创建新会话
                        newConversation();
                    } else {
                        list.forEach(function(conv) {
                            var active = (conv.id === currentConversationId) ? ' active' : '';
                            var timeStr = conv.updatedAt ? formatDate(conv.updatedAt) : '';
                            html +=
                                '<div class="conv-item' + active + '" id="conv-' + conv.id + '" onclick="switchConversation(\'' + conv.id + '\')">' +
                                    '<div class="conv-item-title">' + escapeHtml(conv.title) + '</div>' +
                                    '<div class="conv-item-time">' + timeStr + '</div>' +
                                    '<button class="conv-item-delete" onclick="deleteConversation(\'' + conv.id + '\', event)" title="删除对话">✕</button>' +
                                '</div>';
                        });
                        // 如果当前没有选中任何会话，自动选中最近一条
                        if (!currentConversationId) {
                            switchConversation(list[0].id);
                        }
                    }
                    $('#conversationList').html(html);
                } else if (!currentConversationId) {
                    // 接口异常且无当前会话 → 创建新会话兜底
                    newConversation();
                }
                if (callback) callback();
            },
            error: function() {
                if (!currentConversationId) {
                    newConversation();
                }
                if (callback) callback();
            }
        });
    }

    // ==================== 消息渲染 ====================

    /** 渲染消息列表（替换聊天区域内容） */
    function renderMessages(messages) {
        resetChatArea();
        if (!messages || messages.length === 0) return;

        messages.forEach(function(msg) {
            var timeStr = msg.createTime ? formatTime(msg.createTime) : '';
            if (msg.role === 'user') {
                $('#messages').append(
                    '<div class="msg-sent">' +
                        '<div class="msg-content">' + textToHtml(msg.content) + '</div>' +
                        '<div class="msg-time">' + timeStr + '</div>' +
                    '</div>'
                );
            } else if (msg.role === 'assistant') {
                $('#messages').append(
                    '<div class="msg-received">' +
                        '<div class="msg-image"><img src="assets/images/team/user-2.jpg" alt="doctor"></div>' +
                        '<div class="msg-body">' +
                            '<div class="msg-content">' + renderMarkdown(msg.content) + '</div>' +
                            '<div class="msg-time">' + timeStr + '</div>' +
                            '<div class="followup-buttons">' +
                                '<button class="btn-outline" onclick="askAboutMedication()">💊 询问用药</button>' +
                                '<button class="btn-outline" onclick="askAboutPrevention()">🏥 询问预防</button>' +
                                '<button class="btn-outline" onclick="askAboutDiet()">🍎 饮食建议</button>' +
                                '<button class="btn-outline" onclick="askAboutRecovery()">📅 康复周期</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>'
                );
            }
        });
    }

    /** AI 完成回复后从 DB 重新加载消息（获得真实 ID → 追问按钮） */
    function reloadCurrentMessages() {
        if (!currentConversationId) return;
        $.get('/message/conversation/' + currentConversationId + '/messages', function(resp) {
            if (resp.code === 'SUCCESS' && resp.data) {
                renderMessages(resp.data);
                messageInit();
            }
        });
    }

    /** 重置聊天区域为欢迎消息 */
    function resetChatArea() {
        $('#messages').empty();
        $('#messages').append(
            '<div class="msg-received">' +
                '<div class="msg-image">' +
                    '<img src="assets/images/team/user-2.jpg" alt="image">' +
                '</div>' +
                '<div class="msg-body">' +
                    '<div class="msg-content">' +
                        '[[${session.loginUser.userName}]]你好，我是您的智能专属医生，身体不舒服或者有任何需要咨询的问题，都可以向我提问，我会全心全意为您解答！' +
                    '</div>' +
                    '<div class="msg-time">刚刚</div>' +
                '</div>' +
            '</div>'
        );
    }

    // ==================== 咨询上下文处理 ====================
    function checkConsultContext() {
        const urlParams = new URLSearchParams(window.location.search);
        let consultContext = urlParams.get('consultContext');

        if (consultContext) {
            try {
                const context = JSON.parse(decodeURIComponent(consultContext));
                currentConsultContext = context;
                fillInputWithConsultMessage(context);
            } catch(e) {
                console.error('解析咨询上下文失败', e);
            }
        }
    }

    function fillInputWithConsultMessage(context) {
        const userMessage = buildUserMessage(context);
        $('#message').val(userMessage);
        layer.msg('诊断报告已整理，点击"发送"咨询智能医生', {icon: 1, time: 3000});
        $('#message').focus();
        $('#message')[0].select();
    }

    function buildUserMessage(context) {
        let message = '我有一份诊断报告想咨询一下：\n\n';
        message += '患者：' + context.patientName + '\n';
        message += '诊断：' + context.primaryDiagnosis + '\n';
        if (context.symptoms && context.symptoms.length > 0) {
            message += '症状：' + context.symptoms.join('、') + '\n';
        }
        if (context.recommendations) {
            message += '医生建议：' + context.recommendations + '\n';
        }
        message += '\n请帮我分析一下这个诊断结果，并给出更详细的建议。';
        return message;
    }

    // ==================== 快捷追问 ====================
    function askAboutMedication() {
        $('#message').val('请结合我们刚才讨论的内容，给我一些用药建议。');
        send();
    }
    function askAboutPrevention() {

    // ==================== 辅助函数 ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getTimeStr() {
        var d = new Date();
        return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function renderMarkdown(text) {
        var safe = escapeHtml(text);
        if (typeof marked !== 'undefined') {
            safe = safe
                .replace(/^(#{1,6})(?![#\s])/gm, '$1 ')
                .replace(/^(-)(?![-\s])/gm, '$1 ');
            var html = marked.parse(safe, { breaks: true, gfm: true });
            html = html.replace(/&lt;br\s*\/?&gt;/gi, '<br>');
            return html;
        }
        return safe.replace(/\n/g, '<br>');
    }

    function textToHtml(text) {
        return escapeHtml(text).replace(/\n/g, '<br>');
    }

    /** 格式化后端时间字符串 -> MM/dd HH:mm */
    function formatDate(dateStr) {
        if (!dateStr) return '';
        try {
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) {
                return dateStr.substring(5, 16);
            }
            var month = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            var h = String(d.getHours()).padStart(2, '0');
            var m = String(d.getMinutes()).padStart(2, '0');
            return month + '/' + day + ' ' + h + ':' + m;
        } catch(e) {
            return dateStr.substring(5, 16);
        }
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        try {
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr.substring(11, 16);
            return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        } catch(e) {
            return dateStr.substring(11, 16);
        }
    }
