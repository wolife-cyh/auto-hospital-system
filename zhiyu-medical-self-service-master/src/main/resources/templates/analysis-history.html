<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>分析历史 - 智愈医疗</title>

  <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
  <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
  <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>
  <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>
  <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>
  <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>
  <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>
  <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
  <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">

  <style>
    /* 历史记录页面按钮样式 */
    .btn-speak {
      background: #17a2b8;
      color: white;
      border: none;
      padding: 6px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 10px;
      transition: all 0.3s;
    }

    .btn-speak:hover {
      background: #138496;
      transform: translateY(-1px);
    }

    .btn-speak:active {
      transform: translateY(0);
    }

    .btn-doctor {
      background: #ffc107;
      color: #333;
      border: none;
      padding: 6px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-doctor:hover {
      background: #e0a800;
    }

    .history-card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
    }

    .history-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      transform: translateY(-2px);
    }

    .history-card-header {
      padding: 15px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .history-card-body {
      padding: 15px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .history-info {
      flex: 1;
    }

    .history-info-item {
      margin-bottom: 8px;
      display: flex;
    }

    .history-label {
      width: 80px;
      font-weight: bold;
      color: #666;
      flex-shrink: 0;
    }

    .history-value {
      flex: 1;
      color: #333;
      word-break: break-word;
    }

    .history-diagnosis {
      background: #e8f5e9;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      color: #2e7d32;
      display: inline-block;
    }

    .btn-view {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 6px 20px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-view:hover {
      background: #45a049;
    }

    .btn-delete {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 6px 20px;
      border-radius: 20px;
      cursor: pointer;
    }

    .btn-delete:hover {
      background: #ff4757;
    }

    .empty-history {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .pagination {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pagination button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .pagination button.active {
      background: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn-clear {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-clear:hover {
      background: #c82333;
    }

    .search-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-box input {
      padding: 8px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      width: 200px;
    }

    .search-box button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .search-box button:hover {
      background: #45a049;
    }

    .btn-scan {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 30px;
      transition: all 0.3s;

      display: inline-block;
    }

    .btn-scan:hover {

    /* ============================================================
       报告预览模态框 - 修复文字窜行问题
       ============================================================ */
    .report-preview-modal {
      display: none;

      background: rgba(0, 0, 0, 0.85);

      overflow-y: auto;

    }

    .close-preview {

      right: 25px;

    .preview-actions {

    .btn-print {

    }

    .btn-print:hover {

    .btn-buy {
      display: inline-block;

      border: none;

    .btn-buy:hover {

    /* ============================================================
       报告内容样式 - 修复文字窜行问题
       ============================================================ */
    #reportDetailContent {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;

    #reportDetailContent * {

    #reportDetailContent .report-container {

      margin: 0 auto;

    #reportDetailContent .hospital-info {

    #reportDetailContent .info-row {

    #reportDetailContent .info-label {

    #reportDetailContent .info-value {

    #reportDetailContent .report-section {

    #reportDetailContent .section-title {

      font-weight: bold;
      color: #2e7d32;
      border-left: 4px solid #4CAF50;

    #reportDetailContent .diagnosis-box {

    #reportDetailContent .report-footer {

      font-size: 11px;
      color: #999;

    #reportDetailContent .disclaimer {

      padding: 12px 15px;
      border-radius: 6px;
      font-size: 10px;
      color: #888;
      text-align: center;
      margin-top: 18px;

    }

    #reportDetailContent table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;

    }

    #reportDetailContent table th {

      padding: 8px 12px;

    }

    #reportDetailContent table td {

      justify-content: space-between;

    #reportDetailContent p {
      margin: 4px 0;
    }

    #reportDetailContent b {

    /* ============================================================
       移动端适配

      .report-preview-content {
        padding: 18px 15px;

      }

      #reportDetailContent .report-body {

        flex-direction: column;
        margin-bottom: 10px;
      }

        width: 100%;

      }

      #reportDetailContent .signature-line {
        flex-direction: column;
        gap: 6px;
      }

      #reportDetailContent table {
        font-size: 12px;
      }

      #reportDetailContent table td {
        padding: 5px 8px;
      }

      #reportDetailContent .report-title {
        font-size: 20px;
      }

      .history-card-header {
        flex-direction: column;
        align-items: stretch;
      }

      .history-card-header>div:last-child {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .history-card-header>div:last-child button {
        margin-right: 0;
        font-size: 12px;
        padding: 4px 12px;
      }

      .filter-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box input {
        width: 100%;
      }
    }

    /* ============================================================
       打印样式
       ============================================================ */

           打印样式 - 修复打印时文字窜行
           ============================================================ */

      /* 隐藏不需要打印的元素 */
      body * {
        visibility: hidden;
      }

      .report-preview-modal,
      .report-preview-modal * {
        visibility: visible;
      }

      .report-preview-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        padding: 0;
        margin: 0;
        overflow: visible;
      }

      .report-preview-content {
        box-shadow: none;
        padding: 20px 30px;
        margin: 0 auto;
        max-width: 100%;
        border-radius: 0;
        background: white;
        line-height: 1.8;
        font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "SimSun", "Helvetica Neue", Arial, sans-serif;
      }

      .close-preview,
      .preview-actions {
        display: none !important;
      }

      /* ====== 报告内容打印样式 ====== */
      #reportDetailContent,
      #reportDetailContent * {

        font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "SimSun", "Helvetica Neue", Arial, sans-serif !important;
      }

      #reportDetailContent .report-container {

        background: white;
      }

      #reportDetailContent .report-header {
        text-align: center;
        padding: 20px 20px 15px;
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);

      }

      #reportDetailContent .report-title {
        font-size: 22px;
        font-weight: bold;
        color: #2e7d32;
        margin-bottom: 4px;

      #reportDetailContent .hospital-info {

<script>
  let currentPage = 1;
  let totalPages = 1;
  let allHistoryData = [];
  let historySpeakingMap = {};      // 记录每条历史的播报状态
  let historyUtteranceMap = {};     // 记录每条历史的utterance对象
  let selectedVoice = null;         // 缓存选中的声音
  let stopRequested = false;        // 标记是否是用户主动停止

  // ==================== 初始化声音 ====================
  function initVoice() {
    if ('speechSynthesis' in window) {
      // 等待声音加载完成
      const loadVoices = setInterval(function() {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
          // 选择中文女声
          selectedVoice = voices.find(voice =>
                  voice.lang === 'zh-CN' &&
                  (voice.name.includes('Female') || voice.name.includes('Tingting') || voice.name.includes('Xiaoxiao') || voice.name.includes('Yunxi'))
          );
          // 如果没找到中文女声，用第一个中文声音
          if (!selectedVoice) {
            selectedVoice = voices.find(voice => voice.lang === 'zh-CN');
          }
          clearInterval(loadVoices);
          console.log('声音初始化完成', selectedVoice?.name);
        }
      }, 100);
    }
  }

  // 页面加载时初始化声音
  initVoice();

  // ==================== 语音播报功能（完全修复版） ====================

  // 从历史记录播报
  function speakHistoryResult(historyId) {
    // 获取历史记录数据
    const record = allHistoryData.find(r => r.id === historyId);
    if (!record) {
      layer.msg('未找到历史记录', {icon: 2});
      return;
    }

    // 如果正在播报，先停止（用户主动停止）
    if (historySpeakingMap[historyId]) {
      stopHistorySpeaking(historyId);
      return;  // 停止后不自动开始
    }

    // 开始播报
    startHistorySpeaking(historyId, record);
  }

  // 开始播报历史记录
  function startHistorySpeaking(historyId, record) {
    // 解析分析结果
    let analysisResult = null;
    try {
      if (typeof record.analysisResult === 'string') {
        analysisResult = JSON.parse(record.analysisResult);
      } else {
        analysisResult = record.analysisResult;
      }
    } catch(e) {
      layer.msg('解析报告数据失败', {icon: 2});
      return;
    }

    // 构建播报文本
    let speechText = buildHistorySpeechText(analysisResult, record);

    if (!speechText) {
      layer.msg('未能提取到有效的医疗信息', {icon: 2});
      return;
    }

    if (!('speechSynthesis' in window)) {
      layer.msg('您的浏览器不支持语音播报功能', {icon: 2});
      return;
    }

    // 先取消任何正在播放的语音（全局）
    window.speechSynthesis.cancel();

    // 重置停止标记
    stopRequested = false;

    // 创建语音对象
    const utterance = new SpeechSynthesisUtterance(speechText);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    // 使用预选的声音
    if (selectedVoice) {
      utterance.voice = selectedVoice;
    }

    // 保存utterance以便停止
    historyUtteranceMap[historyId] = utterance;

    // 开始事件
    utterance.onstart = function() {
      // 检查是否是用户主动停止导致的
      if (stopRequested) {
        return;
      }
      historySpeakingMap[historyId] = true;
      updateHistorySpeakButton(historyId, true);
      console.log('开始语音播报 historyId:', historyId);
    };

    // 结束事件（正常结束）
    utterance.onend = function() {
      // 只有非用户停止时才重置按钮
      if (!stopRequested) {
        historySpeakingMap[historyId] = false;
        historyUtteranceMap[historyId] = null;
        updateHistorySpeakButton(historyId, false);
        console.log('语音播报正常结束 historyId:', historyId);
      }
    };

    // 错误事件
    utterance.onerror = function(event) {
      console.log('语音播报事件:', event.error, 'stopRequested:', stopRequested);

      // 如果是因为用户主动停止触发的错误，不做任何处理
      if (stopRequested) {
        console.log('用户主动停止，忽略错误事件');
        return;
      }

      // 如果是中断或取消错误，且不是用户主动停止，可能是页面切换等
      if (event.error === 'interrupted' || event.error === 'canceled') {
        console.log('语音播报被中断（非用户）');
        historySpeakingMap[historyId] = false;
        historyUtteranceMap[historyId] = null;
        updateHistorySpeakButton(historyId, false);
      } else {
        // 真正的错误
        console.error('语音播报错误', event);
        historySpeakingMap[historyId] = false;
        historyUtteranceMap[historyId] = null;
        updateHistorySpeakButton(historyId, false);
        layer.msg('语音播报失败，请重试', {icon: 2});
      }
    };

    // 开始播报
    window.speechSynthesis.speak(utterance);
  }

  // 停止历史记录播报
  function stopHistorySpeaking(historyId) {
    if (historySpeakingMap[historyId]) {
      // 设置停止标记，防止错误事件重新开始
      stopRequested = true;

      // 取消语音
      window.speechSynthesis.cancel();

      // 重置状态
      historySpeakingMap[historyId] = false;
      historyUtteranceMap[historyId] = null;
      updateHistorySpeakButton(historyId, false);

      console.log('用户主动停止语音播报 historyId:', historyId);
    }
  }

  // 更新历史记录页面的播报按钮状态
  function updateHistorySpeakButton(historyId, isPlaying) {
    const btn = $(`#speakHistoryBtn_${historyId}`);
    if (isPlaying) {
      btn.html('<i class="fa fa-stop"></i> 停止');
      btn.css('background', '#dc3545');
      btn.off('click').on('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        stopHistorySpeaking(historyId);
      });
    } else {
      btn.html('<i class="fa fa-volume-up"></i> 播报');
      btn.css('background', '#17a2b8');
      btn.off('click').on('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        speakHistoryResult(historyId);
      });
    }
  }

  // 构建历史记录的播报文本
  function buildHistorySpeechText(analysisResult, record) {
    let speechText = '';

    // 患者信息
    const patientName = analysisResult.patient_name || record.patientName;
    if (patientName && patientName !== '-' && patientName !== '待补充' && patientName !== 'null') {
      speechText += `患者${patientName}，`;
    }

    // 诊断结论
    const diagnosis = analysisResult.diagnosis?.primary_diagnosis || record.primaryDiagnosis;
    if (diagnosis && diagnosis !== '-' && diagnosis !== '待查' && diagnosis !== 'null') {
      speechText += `诊断结果为${diagnosis}。`;
    }

    // 症状
    const symptoms = analysisResult.symptoms;
    if (symptoms && symptoms.length > 0) {
      const validSymptoms = symptoms.filter(s => s && s !== 'null');
      if (validSymptoms.length > 0) {
        speechText += `主要症状包括：${validSymptoms.join('、')}。`;
      }
    }

    // 用药建议
    const medications = analysisResult.medications;
    if (medications && medications.length > 0) {
      const validMeds = medications.filter(m => m.name && m.name !== 'null');
      if (validMeds.length > 0) {
        speechText += `用药建议：`;
        validMeds.forEach(med => {
          speechText += `${med.name}，`;
        });
        speechText = speechText.slice(0, -1) + '。';
      }
    }

    // 医生建议
    const recommendations = analysisResult.recommendations;
    if (recommendations && recommendations !== '-' && recommendations !== '无' && recommendations !== 'null') {
      speechText += `医生建议：${recommendations}。`;
    }

    return speechText;
  }

    var map = {
      'PENDING': '<span class="badge badge-warning" style="background:#f39c12;padding:3px 10px;border-radius:20px;font-size:12px;">等待中</span>',
      'PROCESSING': '<span class="badge badge-info" style="background:#17a2b8;padding:3px 10px;border-radius:20px;font-size:12px;">分析中</span>',

  // 重试失败的任务
  function retryHistory(id) {
    layer.confirm('确定要重新分析此记录吗？', {icon: 3, title: '提示'}, function(index) {
      layer.close(index);
      layer.msg('正在重新提交分析任务...', {icon: 1, time: 1000});
      $.ajax({
        url: '/api/analysis-history/retry',
        type: 'POST',
        data: { id: id },
        success: function(response) {
          if (response.code === 'SUCCESS' || response.success === true) {
            layer.msg('已重新提交，请稍后刷新查看结果', {icon: 1});
            setTimeout(function() { loadHistory(currentPage); }, 2000);
          } else {
            layer.msg(response.message || '操作失败', {icon: 2});
          }
        },
        error: function() {
          layer.msg('操作失败，请重试', {icon: 2});
        }
      });
    });
  }

  // 转义HTML防止XSS
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    let text = String(str);
    return text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // 渲染分页
  function renderPagination() {
    const container = $('#pagination');
    if (totalPages <= 1) {
      container.html('');
      return;
    }

    let html = '';
    html += `<button onclick="loadHistory(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
    html += `<button onclick="loadHistory(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;

    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);
    for (let i = startPage; i <= endPage; i++) {
      html += `<button onclick="loadHistory(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    }

    html += `<button onclick="loadHistory(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
    html += `<button onclick="loadHistory(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>`;

    container.html(html);
  }

            loadHistory(currentPage);

  // 搜索历史
  function searchHistory() {
    const keyword = $('#searchInput').val().toLowerCase();
    if (!keyword) {
      loadHistory(1);
      return;
    }

    const filtered = allHistoryData.filter(record => {
      return (record.patientName && record.patientName.toLowerCase().includes(keyword)) ||
              (record.primaryDiagnosis && record.primaryDiagnosis.toLowerCase().includes(keyword)) ||
              (record.fileName && record.fileName.toLowerCase().includes(keyword));
    });

    renderHistoryList(filtered);
    $('#pagination').html('');
  }

  $(document).ready(function() {
    loadHistory(1);

  // 从历史记录购买药品
  function buyFromHistory(medicineName) {
    // 检查登录状态（通过 Thymeleaf 注入）
    var isLogin = [[${session.loginUser != null}]];
    if (!isLogin) {
      layer.msg('请先登录后再购买', {icon: 2});
      return;
    }

    // 根据药品名称查询药品信息
    $.ajax({
      url: '/api/medicine/search',
      type: 'GET',
      data: { name: medicineName },
      dataType: 'json',
      success: function(response) {
        if (response.code === 'SUCCESS' || response.code === 200) {
          var medicine = response.data;
          // 弹出数量选择
          layer.prompt({
            title: '购买 ' + medicine.name,
            value: '1',
            formType: 0,
            area: ['300px', '150px']
          }, function(quantity, index) {
            layer.close(index);
            var qty = parseInt(quantity);
            if (isNaN(qty) || qty < 1) {
              layer.msg('请输入正确的数量', {icon: 2});
              return;
            }
            createOrderFromHistory(medicine.id, qty);
          });
        } else {
          layer.msg('未找到该药品，请前往药品页面购买', {icon: 2});
        }
      },
      error: function() {
        layer.msg('查询药品失败', {icon: 2});
      }
    });
  }

  // 创建订单并跳转支付
  function createOrderFromHistory(medicineId, quantity) {
    layer.msg('正在创建订单...', {icon: 1, time: 1000});

    $.ajax({
      url: '/order/create',
      type: 'POST',
      data: { medicineId: medicineId, quantity: quantity },
      dataType: 'json',
      success: function(response) {
        if (response.code === 'SUCCESS') {
          var order = response.data;
          layer.closeAll();
          window.location.href = '/payment?orderId=' + order.id;
        } else {
          layer.msg(response.message || '创建订单失败', {icon: 2});
        }
      },
      error: function(xhr) {
        try {
          var resp = JSON.parse(xhr.responseText);
          layer.msg(resp.message || '网络错误', {icon: 2});
        } catch(e) {
          layer.msg('网络错误，请稍后再试', {icon: 2});
        }
      }
    });
  }
